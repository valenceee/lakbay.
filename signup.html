<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Lakbay</title>generate the raw html file for signup. there is an option such as sign up as a user or signup as admin
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <h1>Create Account</h1>
            <p>Join Lakbay today</p>
        </div>

        <div class="success-message" id="successMessage"></div>

        <form id="signupForm" novalidate>
            <!-- Role Selection -->
            <div class="role-selection">
                <div class="role-option">
                    <input type="radio" id="roleUser" name="role" value="user" checked>
                    <label for="roleUser" class="role-label">User</label>
                </div>
                <div class="role-option">
                    <input type="radio" id="roleAdmin" name="role" value="admin">
                    <label for="roleAdmin" class="role-label">Admin</label>
                </div>
            </div>

            <!-- Full Name -->
            <div class="form-group">
                <label for="fullName">Full Name:*</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                <div class="error-message"></div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address:*</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                <div class="error-message"></div>
            </div>

            <!-- Phone Number -->
            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
                <div class="error-message"></div>
            </div>

            <!-- User-specific fields -->
            <div class="form-group user-only">
                <label for="address">Address:</label>
                <input type="text" id="address" name="address" placeholder="Enter your address">
            </div>

            <div class="form-row user-only">
                <div class="form-group">
                    <label for="city">City:</label>
                    <input type="text" id="city" name="city" placeholder="Enter your city">
                </div>
                <div class="form-group">
                    <label for="zipcode">Zip Code:</label>
                    <input type="text" id="zipcode" name="zipcode" placeholder="Enter zip code">
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password:*</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Create a strong password" required>
                    <button type="button" id="togglePassword" aria-label="Toggle password visibility">
                        <svg id="iconEyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg id="iconEyeHidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.26 3.64m-5.88-2.88a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
                <div class="error-message"></div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirmPassword">Confirm Password:*</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                    <button type="button" id="toggleConfirmPassword" aria-label="Toggle password visibility">
                        <svg id="iconEyeOpen2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg id="iconEyeHidden2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.26 3.64m-5.88-2.88a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
                <div class="error-message"></div>
            </div>

            <!-- Terms and Conditions -->
            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the <a href="#terms">Terms of Service</a> and <a href="#privacy">Privacy Policy</a></label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-signup">Create Account</button>
        </form>

        <!-- Footer -->
        <div class="signup-footer">
            Already have an account? <a href="adminLogin.html">Log in here</a>
        </div>
    </div>

    <script src="javascript.js"></script>
</body>
</html>
