<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Welcome Back!</h1>
    <h2>Login</h2>

    <form action="/login" method="POST">
        <!--Email field-->
    <div>
    <label>Email:</label>
    <input type="email" id="email" name="email" placeholder="Enter email" required> <br><br>
    </div>
        <!--password field -->
    <div>
    <label>Password:</label>
    <div class="password-wrapper">
        <input type="password" id="password" name="password" placeholder="Enter password" required
            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}"
            title="Must contain at least 8 characters, including uppercase, lowercase, number, and special character.">
        <button type="button" id="togglePassword" aria-label="Toggle password visibility">
                   <svg id="iconEyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg id="iconEyeHidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.26 3.64m-5.88-2.88a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                </button>
    </div> <br><br>
        <!--remember me and forgot password -->
    <div>
    <input type="checkbox" id="rememberMe">
    <label for="rememberMe">Remember Me:</label> <br><br> 
    &nbsp;&nbsp;&nbsp;
    <a href="#">Forgot Password?</a> <br><br>
    </div>
        <!--login button-->
    <button type="submit">Login</button> <br><br>

    </form>

    <p>or</p>
        <!--redirection buttons for admin login and signup -->
    <button type="button" onclick="window.location.href='adminLogin.html'">Login as Admin</button>
    <button type="button" onclick="window.location.href='signup.html'">Create an Account</button> <br><br>

</body>
</html>
